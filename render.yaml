# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ist-voice-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gevent --workers 1 --timeout 180 --graceful-timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
